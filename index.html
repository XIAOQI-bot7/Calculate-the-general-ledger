<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>年度记账本</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap');
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #f5f6fa; --card: #ffffff; --text: #2d3436; --sub: #636e72;
    --green: #00b894; --red: #e17055; --blue: #0984e3; --border: #e0e3eb;
    --shadow: 0 2px 12px rgba(0,0,0,0.06); --radius: 12px;
  }
  body { font-family: 'Noto Sans SC', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; line-height: 1.6; }

  #authScreen { display: flex; justify-content: center; align-items: center; min-height: 100vh; background: linear-gradient(135deg, #2d3436 0%, #434a54 100%); padding: 24px; }
  .auth-card { background: #fff; border-radius: 16px; padding: 40px; width: 100%; max-width: 420px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
  .auth-card h1 { text-align: center; margin-bottom: 4px; font-size: 1.5rem; letter-spacing: 2px; }
  .auth-card h1 span { color: #00b894; }
  .auth-card .subtitle { text-align: center; color: #999; font-size: 0.85rem; margin-bottom: 28px; }
  .auth-tabs { display: flex; margin-bottom: 24px; border-radius: 8px; overflow: hidden; border: 1px solid var(--border); }
  .auth-tab { flex: 1; padding: 10px; border: none; background: #fafbfc; cursor: pointer; font-size: 0.9rem; font-weight: 500; transition: all 0.2s; font-family: inherit; text-align: center; }
  .auth-tab.active { background: var(--blue); color: #fff; font-weight: 700; }
  .auth-form .form-group { margin-bottom: 16px; }
  .auth-form label { display: block; font-size: 0.8rem; font-weight: 700; color: var(--sub); margin-bottom: 4px; letter-spacing: 1px; }
  .auth-form input { width: 100%; padding: 11px 14px; border: 1px solid var(--border); border-radius: 8px; font-size: 0.95rem; font-family: inherit; transition: border 0.2s; }
  .auth-form input:focus { outline: none; border-color: var(--blue); box-shadow: 0 0 0 3px rgba(9,132,227,0.1); }
  .auth-btn { width: 100%; padding: 12px; border: none; border-radius: 8px; background: linear-gradient(135deg, #0984e3, #0767b1); color: #fff; font-size: 1rem; font-weight: 700; cursor: pointer; letter-spacing: 2px; font-family: inherit; margin-top: 8px; }
  .auth-btn:hover { transform: translateY(-1px); }
  .auth-btn:active { transform: scale(0.98); }
  .auth-btn:disabled { opacity: 0.6; }
  .auth-divider { text-align: center; color: #bbb; font-size: 0.8rem; margin: 18px 0 8px; position: relative; }
  .auth-divider::before, .auth-divider::after { content: ''; position: absolute; top: 50%; height: 1px; background: var(--border); width: 38%; }
  .auth-divider::before { left: 0; }
  .auth-divider::after { right: 0; }
  .guest-btn { width: 100%; padding: 11px; border: 1px dashed #b2bec3; border-radius: 8px; background: #fff; color: #636e72; font-size: 0.95rem; cursor: pointer; letter-spacing: 2px; font-family: inherit; transition: all 0.2s; }
  .guest-btn:hover { border-color: #00b894; color: #00b894; background: #f0fdf8; }
  .auth-error { color: #e17055; font-size: 0.8rem; text-align: center; margin-top: 12px; min-height: 20px; }

  .guest-badge { background: #fdcb6e22; color: #e17055; border: 1px solid #e1705533; padding: 2px 10px; border-radius: 99px; font-size: 0.7rem; font-weight: 700; letter-spacing: 1px; }
  .guest-hint { text-align: center; padding: 10px 24px; background: #fff8e1; color: #8d6e00; font-size: 0.75rem; }

  #appScreen { display: none; }
  #appScreen.active { display: block; }
  .header { background: linear-gradient(135deg, #2d3436 0%, #434a54 100%); color: #fff; padding: 16px 0 0; position: sticky; top: 0; z-index: 10; box-shadow: 0 4px 20px rgba(0,0,0,0.15); }
  .header-inner { max-width: 1100px; margin: 0 auto; padding: 0 24px; }
  .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; flex-wrap: wrap; gap: 8px; }
  .logo { font-size: 1.3rem; font-weight: 700; letter-spacing: 2px; }
  .logo span { color: #00b894; }
  .user-area { display: flex; align-items: center; gap: 12px; }
  .user-email { font-size: 0.8rem; color: rgba(255,255,255,0.7); max-width: 180px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .logout-btn { padding: 6px 16px; border: 1px solid rgba(255,255,255,0.3); background: transparent; color: #fff; border-radius: 6px; cursor: pointer; font-size: 0.8rem; font-family: inherit; }
  .logout-btn:hover { background: rgba(255,255,255,0.1); }

  .year-tabs { display: flex; gap: 4px; overflow-x: auto; padding-bottom: 2px; }
  .year-tabs::-webkit-scrollbar { height: 0; }
  .year-tab { padding: 10px 22px; background: rgba(255,255,255,0.08); border: none; color: rgba(255,255,255,0.7); font-size: 0.95rem; font-weight: 500; cursor: pointer; border-radius: 8px 8px 0 0; transition: all 0.2s; white-space: nowrap; font-family: inherit; }
  .year-tab:hover { color: #fff; background: rgba(255,255,255,0.15); }
  .year-tab.active { background: var(--card); color: var(--text); font-weight: 700; }
  .add-year-btn { padding: 10px 14px; background: transparent; border: 1px dashed rgba(255,255,255,0.3); color: rgba(255,255,255,0.6); font-size: 1rem; cursor: pointer; border-radius: 8px 8px 0 0; }
  .add-year-btn:hover { border-color: #fff; color: #fff; }

  .main { max-width: 1100px; margin: 0 auto; padding: 24px; display: grid; grid-template-columns: 380px 1fr; gap: 24px; align-items: start; }
  @media (max-width: 800px) { .main { grid-template-columns: 1fr; } }
  .card { background: var(--card); border-radius: var(--radius); padding: 24px; box-shadow: var(--shadow); border: 1px solid var(--border); }
  .card-title { font-size: 1rem; font-weight: 700; margin-bottom: 20px; display: flex; align-items: center; gap: 8px; color: var(--text); }
  .card-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  .summary-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; max-width: 1100px; margin: 0 auto; padding: 0 24px 24px; }
  @media (max-width: 800px) { .summary-grid { grid-template-columns: 1fr 1fr; } }
  .summary-card { background: var(--card); border-radius: var(--radius); padding: 20px; box-shadow: var(--shadow); border: 1px solid var(--border); text-align: center; }
  .summary-card .label { font-size: 0.8rem; color: var(--sub); margin-bottom: 6px; }
  .summary-card .value { font-size: 1.6rem; font-weight: 700; }
  .summary-card .value.income { color: var(--green); }
  .summary-card .value.expense { color: var(--red); }
  .summary-card .value.balance { color: var(--blue); }

  .form-group { margin-bottom: 16px; }
  .form-group label { display: block; font-size: 0.8rem; font-weight: 700; color: var(--sub); margin-bottom: 4px; letter-spacing: 1px; }
  .form-group input, .form-group textarea, .form-group select { width: 100%; padding: 10px 14px; border: 1px solid var(--border); border-radius: 8px; font-size: 0.95rem; font-family: inherit; background: #fafbfc; }
  .form-group input:focus, .form-group textarea:focus { outline: none; border-color: var(--blue); box-shadow: 0 0 0 3px rgba(9,132,227,0.1); }
  .form-group textarea { resize: vertical; min-height: 60px; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .type-toggle { display: flex; gap: 8px; }
  .type-btn { flex: 1; padding: 10px; border: 2px solid var(--border); border-radius: 8px; background: #fafbfc; cursor: pointer; font-size: 0.9rem; font-weight: 500; transition: all 0.2s; font-family: inherit; text-align: center; }
  .type-btn.income-btn.active { border-color: var(--green); background: #e6faf4; color: var(--green); font-weight: 700; }
  .type-btn.expense-btn.active { border-color: var(--red); background: #fef0ed; color: var(--red); font-weight: 700; }
  .submit-btn { width: 100%; padding: 12px; border: none; border-radius: 8px; background: linear-gradient(135deg, #2d3436, #434a54); color: #fff; font-size: 1rem; font-weight: 700; cursor: pointer; letter-spacing: 2px; font-family: inherit; }
  .submit-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 16px rgba(0,0,0,0.2); }
  .submit-btn:disabled { opacity: 0.5; }
  .hint { font-size: 0.75rem; color: #b2bec3; margin-top: 2px; }

  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
  thead th { background: #f8f9fb; padding: 12px 14px; text-align: left; font-weight: 700; color: var(--sub); font-size: 0.75rem; letter-spacing: 1px; border-bottom: 2px solid var(--border); white-space: nowrap; cursor: pointer; user-select: none; }
  thead th:hover { color: var(--blue); }
  thead th .sort-arrow { margin-left: 4px; font-size: 0.7rem; }
  tbody td { padding: 12px 14px; border-bottom: 1px solid var(--border); vertical-align: middle; }
  tbody tr:hover { background: #f8f9fb; }
  .type-badge { display: inline-block; padding: 3px 10px; border-radius: 99px; font-size: 0.75rem; font-weight: 700; }
  .type-badge.income { background: #e6faf4; color: var(--green); }
  .type-badge.expense { background: #fef0ed; color: var(--red); }
  .amount-cell { font-weight: 700; }
  .amount-cell.income { color: var(--green); }
  .amount-cell.expense { color: var(--red); }
  .desc-cell { max-width: 200px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--sub); }
  .delete-btn { background: none; border: none; cursor: pointer; font-size: 1rem; opacity: 0.3; padding: 4px 8px; border-radius: 4px; }
  .delete-btn:hover { opacity: 1; background: #fef0ed; }
  .edit-btn { background: none; border: none; cursor: pointer; font-size: 1rem; opacity: 0.3; padding: 4px 8px; border-radius: 4px; }
  .edit-btn:hover { opacity: 1; background: #eef2f7; }
  .clear-all-btn {
    padding: 6px 14px; border: 1px solid #e17055; background: transparent; color: #e17055;
    border-radius: 6px; cursor: pointer; font-size: 0.8rem; font-family: inherit; transition: all 0.2s; white-space: nowrap;
  }
  .clear-all-btn:hover { background: #e17055; color: #fff; }
  .cancel-edit-btn {
    padding: 10px 16px; border: 1px solid var(--border); background: #fff; color: var(--sub);
    border-radius: 8px; cursor: pointer; font-size: 0.85rem; font-family: inherit; transition: all 0.2s;
  }
  .cancel-edit-btn:hover { border-color: #b2bec3; }
  .row-checkbox { width: 16px; height: 16px; cursor: pointer; accent-color: var(--blue); }
  .batch-delete-btn {
    padding: 6px 14px; border: 1px solid #e17055; background: #e17055; color: #fff;
    border-radius: 6px; cursor: pointer; font-size: 0.8rem; font-family: inherit; transition: all 0.2s; white-space: nowrap; display: none;
  }
  .batch-delete-btn.show { display: inline-block; }
  .batch-delete-btn:hover { background: #c0392b; }
  .empty-state { text-align: center; padding: 48px 24px; color: #b2bec3; }
  .empty-state .icon { font-size: 3rem; margin-bottom: 12px; }
  .filter-bar { display: flex; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; align-items: center; }
  .filter-bar input { padding: 8px 12px; border: 1px solid var(--border); border-radius: 6px; font-size: 0.85rem; font-family: inherit; width: 180px; }
  .filter-bar input:focus { outline: none; border-color: var(--blue); }
  .filter-bar select { padding: 8px 12px; border: 1px solid var(--border); border-radius: 6px; font-size: 0.85rem; font-family: inherit; background: #fff; }
  .record-count { margin-left: auto; font-size: 0.8rem; color: var(--sub); }

  .toast { position: fixed; top: 20px; right: 20px; background: #2d3436; color: #fff; padding: 12px 24px; border-radius: 8px; font-size: 0.9rem; z-index: 100; opacity: 0; transform: translateY(-10px); transition: all 0.3s; pointer-events: none; }
  .toast.show { opacity: 1; transform: translateY(0); }

  /* 交易对象可点击 */
  .party-link { color: var(--blue); cursor: pointer; text-decoration: none; font-weight: 500; transition: color 0.15s; }
  .party-link:hover { color: #0767b1; text-decoration: underline; }

  /* 弹窗 */
  .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 200; display: none; justify-content: center; align-items: center; padding: 24px; }
  .modal-overlay.show { display: flex; }
  .modal { background: #fff; border-radius: 14px; width: 100%; max-width: 700px; max-height: 85vh; display: flex; flex-direction: column; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
  .modal-header { padding: 20px 24px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
  .modal-header h2 { font-size: 1.1rem; letter-spacing: 1px; }
  .modal-close { background: none; border: none; font-size: 1.5rem; cursor: pointer; color: #999; padding: 4px 8px; border-radius: 4px; line-height: 1; }
  .modal-close:hover { color: #333; background: #f5f5f5; }
  .modal-summary { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; padding: 16px 24px; border-bottom: 1px solid var(--border); }
  .modal-summary-item { text-align: center; }
  .modal-summary-item .label { font-size: 0.7rem; color: var(--sub); }
  .modal-summary-item .val { font-size: 1.1rem; font-weight: 700; }
  .modal-summary-item .val.inc { color: var(--green); }
  .modal-summary-item .val.exp { color: var(--red); }
  .modal-summary-item .val.bal { color: var(--blue); }
  .modal-body { overflow-y: auto; padding: 16px 24px; flex: 1; }
  .modal-body table { font-size: 0.85rem; }
  .modal-body thead th { font-size: 0.7rem; }
  .spinner { display: inline-block; width: 18px; height: 18px; border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin 0.6s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div id="authScreen">
  <div class="auth-card">
    <h1>📒 年度<span>记账</span>本</h1>
    <p class="subtitle">注册账号，多设备同步数据</p>
    <div class="auth-tabs">
      <button class="auth-tab active" data-tab="login">登 录</button>
      <button class="auth-tab" data-tab="register">注 册</button>
    </div>
    <form class="auth-form" id="authForm" autocomplete="off">
      <div class="form-group"><label>邮箱</label><input type="email" id="authEmail" placeholder="your@email.com" required></div>
      <div class="form-group"><label>密码</label><input type="password" id="authPassword" placeholder="至少6位密码" minlength="6" required></div>
      <div class="form-group" id="confirmGroup" style="display:none;"><label>确认密码</label><input type="password" id="authConfirm" placeholder="再次输入密码" minlength="6"></div>
      <button type="submit" class="auth-btn" id="authSubmitBtn">登 录</button>
      <div class="auth-error" id="authError"></div>
    </form>
    <div class="auth-divider">或</div>
    <button class="guest-btn" id="guestLoginBtn">🕶️ 游客体验（数据保存在本地）</button>
  </div>
</div>

<div id="appScreen">
  <div class="header">
    <div class="header-inner">
      <div class="header-top">
        <div class="logo">📒 年度<span>记账</span>本</div>
        <div class="user-area">
          <span class="guest-badge" id="guestBadge" style="display:none;">本地模式</span>
          <span class="user-email" id="userEmail"></span>
          <button class="logout-btn" id="logoutBtn">退出</button>
        </div>
      </div>
      <div class="year-tabs" id="yearTabs"></div>
    </div>
  </div>
  <div class="guest-hint" id="guestHint" style="display:none;">💡 游客模式下数据仅保存在本设备浏览器。注册登录后可多设备同步，永不丢失。</div>
  <div class="summary-grid" id="summaryGrid"></div>
  <div class="main">
    <div class="card">
      <div class="card-title">✏️ 记一笔</div>
      <form id="billForm" autocomplete="off">
        <div class="form-group"><label>收支类型</label>
          <div class="type-toggle" id="typeToggle">
            <button type="button" class="type-btn income-btn active" data-type="income">💰 收入</button>
            <button type="button" class="type-btn expense-btn" data-type="expense">💸 支出</button>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group"><label>日期 *</label><input type="date" id="billDate" required></div>
          <div class="form-group"><label>金额 *</label><input type="number" id="billAmount" placeholder="0.00" step="0.01" min="0.01" required></div>
        </div>
        <div class="form-group"><label>交易对象 *</label><input type="text" id="billParty" placeholder="例如：超市、张三、滴滴..." required></div>
        <div class="form-group"><label>详细说明 <span class="hint">（选填）</span></label><textarea id="billDesc" placeholder="买了什么、为什么花这笔钱..."></textarea></div>
        <div style="display:flex;gap:8px;">
          <button type="submit" class="submit-btn" id="submitBillBtn" style="flex:1;">📝 记 录</button>
          <button type="button" class="cancel-edit-btn" id="cancelEditBtn" style="display:none;">取消</button>
        </div>
      </form>
    </div>
    <div class="card">
      <div class="card-title">📋 账单明细</div>
      <div class="filter-bar">
        <input type="text" id="filterParty" placeholder="🔍 搜索交易对象...">
        <select id="filterType"><option value="all">全部类型</option><option value="income">💰 收入</option><option value="expense">💸 支出</option></select>
        <button class="clear-all-btn" id="clearAllBtn" title="删除当前年份所有账单">🗑️ 清空今年</button>
        <button class="batch-delete-btn" id="batchDeleteBtn">删除选中</button>
        <span class="record-count" id="recordCount"></span>
      </div>
      <div class="table-wrap">
        <table><thead><tr>
          <th style="width:28px;"><input type="checkbox" class="row-checkbox" id="selectAllCb" title="全选/取消全选"></th>
          <th data-sort="date">日期 <span class="sort-arrow"></span></th>
          <th data-sort="type">类型 <span class="sort-arrow"></span></th>
          <th data-sort="party">交易对象 <span class="sort-arrow"></span></th>
          <th data-sort="amount">金额 <span class="sort-arrow"></span></th>
          <th>说明</th><th>操作</th>
        </tr></thead>
        <tbody id="tableBody"></tbody></table>
      </div>
      <div class="empty-state" id="emptyState"><div class="icon">📭</div><p>这个年份还没有账单记录</p></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- 交易对象详情弹窗 -->
<div class="modal-overlay" id="partyModal">
  <div class="modal">
    <div class="modal-header">
      <h2 id="modalTitle"></h2>
      <button class="modal-close" id="modalClose">✕</button>
    </div>
    <div class="modal-summary" id="modalSummary"></div>
    <div class="modal-body">
      <div class="table-wrap">
        <table>
          <thead><tr>
            <th>日期</th><th>类型</th><th>金额</th><th>说明</th><th>操作</th>
          </tr></thead>
          <tbody id="modalTableBody"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<script>
// ============================================================
//  配置
// ============================================================
const SB_URL = 'https://byvcwrhsmmqgtdtpmxjz.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJ5dmN3cmhzbW1xZ3RkdHBteGp6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgzMzk3NDUsImV4cCI6MjA5MzkxNTc0NX0.kEJPmrfQWbTc5tYfaNVX8Og1oMU2PvRnLEreg8iFDX8';

// ============================================================
//  Supabase REST API 封装（无需任何 CDN SDK）
// ============================================================
const api = {
  headers(token) {
    const h = { 'Content-Type': 'application/json', 'apikey': SB_KEY };
    if (token) h['Authorization'] = 'Bearer ' + token;
    return h;
  },

  async signUp(email, password) {
    const r = await fetch(SB_URL + '/auth/v1/signup', {
      method: 'POST', headers: this.headers(),
      body: JSON.stringify({ email, password })
    });
    return r.json();
  },

  async signIn(email, password) {
    const r = await fetch(SB_URL + '/auth/v1/token?grant_type=password', {
      method: 'POST', headers: this.headers(),
      body: JSON.stringify({ email, password })
    });
    return r.json();
  },

  async getUser(token) {
    const r = await fetch(SB_URL + '/auth/v1/user', {
      headers: this.headers(token)
    });
    return r.json();
  },

  async fetchBills(token, userId) {
    const r = await fetch(SB_URL + '/rest/v1/bills?select=*&user_id=eq.' + encodeURIComponent(userId) + '&order=date.desc', {
      headers: this.headers(token)
    });
    if (!r.ok) throw new Error(await r.text());
    return r.json();
  },

  async insertBill(token, bill) {
    const h = this.headers(token);
    h['Prefer'] = 'return=minimal';
    const r = await fetch(SB_URL + '/rest/v1/bills', {
      method: 'POST', headers: h, body: JSON.stringify(bill)
    });
    if (!r.ok) throw new Error(await r.text());
    // 201 Created 可能返回空体，不需要解析
  },

  async deleteBill(token, id) {
    const r = await fetch(SB_URL + '/rest/v1/bills?id=eq.' + encodeURIComponent(id), {
      method: 'DELETE', headers: this.headers(token)
    });
    if (!r.ok) throw new Error(await r.text());
  },

  async updateBill(token, id, bill) {
    const h = this.headers(token);
    h['Prefer'] = 'return=minimal';
    const r = await fetch(SB_URL + '/rest/v1/bills?id=eq.' + encodeURIComponent(id), {
      method: 'PATCH', headers: h, body: JSON.stringify(bill)
    });
    if (!r.ok) throw new Error(await r.text());
  },
};

// ============================================================
//  状态
// ============================================================
let currentUser = null;       // { id, email }
let accessToken = null;
let isGuest = false;          // 游客模式
let authMode = 'login';
let cachedBills = [];
let currentYear = new Date().getFullYear();
let currentType = 'income';
let sortKey = 'date';
let sortDir = 'desc';
let editingId = null; // 正在编辑的账单 ID，null = 新增模式
let selectedIds = new Set(); // 批量选中的账单 ID

// ============================================================
//  本地存储（游客模式用）
// ============================================================
const LS_KEY = 'ledger_guest_data'; // { bills: [...] }

function lsLoad() {
  try { return JSON.parse(localStorage.getItem(LS_KEY)) || { bills: [] }; }
  catch { return { bills: [] }; }
}
function lsSave(data) {
  localStorage.setItem(LS_KEY, JSON.stringify(data));
}

// ============================================================
//  认证
// ============================================================
document.querySelectorAll('.auth-tab').forEach(tab => tab.addEventListener('click', () => {
  authMode = tab.dataset.tab;
  document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
  tab.classList.add('active');
  document.getElementById('confirmGroup').style.display = authMode === 'register' ? 'block' : 'none';
  document.getElementById('authSubmitBtn').textContent = authMode === 'register' ? '注 册' : '登 录';
  document.getElementById('authError').textContent = '';
}));

document.getElementById('authForm').addEventListener('submit', async function(e) {
  e.preventDefault();
  const email = document.getElementById('authEmail').value.trim();
  const password = document.getElementById('authPassword').value;
  const errEl = document.getElementById('authError'), btn = document.getElementById('authSubmitBtn');
  errEl.textContent = '';

  if (password.length < 6) { errEl.textContent = '密码至少需要6位'; return; }

  if (authMode === 'register') {
    const confirm = document.getElementById('authConfirm').value;
    if (password !== confirm) { errEl.textContent = '两次密码不一致'; return; }
    btn.disabled = true; btn.innerHTML = '<span class="spinner"></span> 注册中...';
    const data = await api.signUp(email, password);
    btn.disabled = false; btn.textContent = '注 册';
    if (data.error) {
      errEl.textContent = data.error.message || data.msg || JSON.stringify(data.error);
    } else if (data.email && !data.access_token) {
      // Needs email confirmation
      errEl.textContent = '请检查邮箱并点击确认链接后再登录';
    } else if (data.access_token) {
      // Auto-login
      accessToken = data.access_token;
      currentUser = data.user;
      showApp();
    } else {
      errEl.textContent = '注册成功，请切换到登录页面登录';
    }
  } else {
    btn.disabled = true; btn.innerHTML = '<span class="spinner"></span> 登录中...';
    const data = await api.signIn(email, password);
    btn.disabled = false; btn.textContent = '登 录';
    if (data.error) {
      errEl.textContent = data.error_description || data.error.message || '邮箱或密码错误';
    } else if (data.access_token) {
      accessToken = data.access_token;
      currentUser = data.user;
      showApp();
    }
  }
});

document.getElementById('logoutBtn').addEventListener('click', () => {
  isGuest = false;
  accessToken = null;
  currentUser = null;
  cachedBills = [];
  showAuth();
});

// 游客登录
document.getElementById('guestLoginBtn').addEventListener('click', () => {
  isGuest = true;
  accessToken = null;
  currentUser = { id: 'guest', email: '游客' };
  showApp();
});

// ============================================================
//  界面切换
// ============================================================
function showApp() {
  document.getElementById('authScreen').style.display = 'none';
  document.getElementById('appScreen').classList.add('active');
  document.getElementById('userEmail').textContent = isGuest ? '游客' : (currentUser?.email || '');
  document.getElementById('guestBadge').style.display = isGuest ? 'inline-block' : 'none';
  document.getElementById('guestHint').style.display = isGuest ? 'block' : 'none';
  document.getElementById('authEmail').value = '';
  document.getElementById('authPassword').value = '';
  document.getElementById('authConfirm').value = '';
  refreshAll();
}
function showAuth() {
  document.getElementById('authScreen').style.display = 'flex';
  document.getElementById('appScreen').classList.remove('active');
}

// ============================================================
//  数据操作
// ============================================================
async function syncData() {
  if (isGuest) {
    cachedBills = lsLoad().bills;
  } else {
    if (!accessToken || !currentUser) return;
    try { cachedBills = await api.fetchBills(accessToken, currentUser.id); }
    catch (e) { console.error('Sync error:', e); }
  }
}

function genLocalId() {
  return 'g_' + crypto.randomUUID();
}

async function deleteBillById(id) {
  if (isGuest) {
    const store = lsLoad();
    store.bills = store.bills.filter(b => b.id !== id);
    lsSave(store);
  } else {
    await api.deleteBill(accessToken, id);
  }
}

function getBillsForYear(y) {
  return cachedBills.filter(b => parseInt(b.date.slice(0, 4)) === y);
}

function getAllYears() {
  const set = new Set();
  for (const b of cachedBills) { const y = parseInt(b.date.slice(0, 4)); if (y > 0) set.add(y); }
  const arr = [...set], cy = new Date().getFullYear();
  if (!arr.includes(cy)) arr.push(cy);
  return arr.sort((a, b) => b - a);
}

function getYearTotals(y) {
  const bills = getBillsForYear(y);
  let inc = 0, exp = 0;
  for (const b of bills) {
    if (b.type === 'income') inc += Number(b.amount);
    else exp += Number(b.amount);
  }
  return { income: inc, expense: exp, balance: inc - exp };
}

// ============================================================
//  渲染
// ============================================================
function renderYearTabs() {
  const container = document.getElementById('yearTabs');
  const years = getAllYears();
  container.innerHTML = years.map(y =>
    `<button class="year-tab${y === currentYear ? ' active' : ''}" data-year="${y}">${y} 年</button>`
  ).join('') + '<button class="add-year-btn" id="addYearBtn">+</button>';

  container.querySelectorAll('.year-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      currentYear = +tab.dataset.year;
      resetEditMode();
      refreshUI();
    });
  });
  document.getElementById('addYearBtn').addEventListener('click', () => {
    const y = prompt('请输入年份（如 2024）：', new Date().getFullYear());
    if (y && /^\d{4}$/.test(y)) { currentYear = +y; refreshUI(); }
  });
}

function renderSummary() {
  const { income, expense, balance } = getYearTotals(currentYear);
  document.getElementById('summaryGrid').innerHTML =
    `<div class="summary-card"><div class="label">💰 总收入</div><div class="value income">+¥${income.toFixed(2)}</div></div>` +
    `<div class="summary-card"><div class="label">💸 总支出</div><div class="value expense">-¥${expense.toFixed(2)}</div></div>` +
    `<div class="summary-card"><div class="label">📊 结余</div><div class="value balance">¥${balance.toFixed(2)}</div></div>`;
}

function renderTable() {
  let bills = getBillsForYear(currentYear);
  const allBills = [...bills];
  const fp = document.getElementById('filterParty').value.toLowerCase().trim();
  const ft = document.getElementById('filterType').value;
  if (fp) bills = bills.filter(b => b.party.toLowerCase().includes(fp));
  if (ft !== 'all') bills = bills.filter(b => b.type === ft);

  bills.sort((a, b) => {
    let va, vb;
    if (sortKey === 'date') { va = a.date; vb = b.date; }
    else if (sortKey === 'amount') { va = Number(a.amount); vb = Number(b.amount); }
    else if (sortKey === 'party') { va = a.party; vb = b.party; }
    else { va = a.type; vb = b.type; }
    const cmp = va < vb ? -1 : va > vb ? 1 : 0;
    return sortDir === 'asc' ? cmp : -cmp;
  });

  const tbody = document.getElementById('tableBody');
  const es = document.getElementById('emptyState');
  if (allBills.length === 0) {
    tbody.innerHTML = '';
    es.style.display = 'block';
    document.getElementById('recordCount').textContent = '';
  } else {
    es.style.display = 'none';
    if (bills.length === 0) {
      tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;color:#b2bec3;padding:32px;">没有匹配的账单</td></tr>';
    } else {
      tbody.innerHTML = bills.map(b => {
        const cls = b.type === 'income' ? 'income' : 'expense';
        const sign = b.type === 'income' ? '+' : '-';
        const descText = b.description || '<span style="color:#ccc">—</span>';
        const checked = selectedIds.has(b.id) ? ' checked' : '';
        return `<tr>
          <td><input type="checkbox" class="row-checkbox bill-cb" data-id="${b.id}"${checked}></td>
          <td>${b.date}</td>
          <td><span class="type-badge ${b.type}">${b.type === 'income' ? '收入' : '支出'}</span></td>
          <td><span class="party-link" data-party="${esc(b.party)}">${esc(b.party)}</span></td>
          <td class="amount-cell ${cls}">${sign}¥${Number(b.amount).toFixed(2)}</td>
          <td class="desc-cell" title="${esc(b.description || '')}">${descText}</td>
          <td>
            <button class="edit-btn" data-id="${b.id}">✏️</button>
            <button class="delete-btn" data-id="${b.id}">🗑️</button>
          </td>
        </tr>`;
      }).join('');
    }
    document.getElementById('recordCount').textContent = bills.length + ' 条记录';
  }

  tbody.querySelectorAll('.delete-btn').forEach(btn => {
    btn.addEventListener('click', async () => {
      if (confirm('确定删除？')) {
        await deleteBillById(btn.dataset.id);
        await syncData();
        refreshUI();
        showToast('已删除');
      }
    });
  });

  tbody.querySelectorAll('.edit-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const bill = cachedBills.find(b => b.id == btn.dataset.id);
      if (!bill) return;
      // 填充表单
      document.getElementById('billDate').value = bill.date;
      document.getElementById('billAmount').value = Number(bill.amount);
      document.getElementById('billParty').value = bill.party;
      document.getElementById('billDesc').value = bill.description || '';
      // 设置类型
      document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
      const typeBtn = document.querySelector(`.type-btn[data-type="${bill.type}"]`);
      if (typeBtn) typeBtn.classList.add('active');
      currentType = bill.type;
      // 切换到编辑模式
      editingId = bill.id;
      document.getElementById('submitBillBtn').textContent = '✏️ 更 新';
      document.getElementById('cancelEditBtn').style.display = 'inline-block';
      document.getElementById('billDate').focus();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });
  });

  // 交易对象点击 → 弹窗
  tbody.querySelectorAll('.party-link').forEach(link => {
    link.addEventListener('click', () => showPartyModal(link.dataset.party));
  });

  // 复选框事件
  tbody.querySelectorAll('.bill-cb').forEach(cb => {
    cb.addEventListener('change', () => {
      if (cb.checked) selectedIds.add(cb.dataset.id);
      else selectedIds.delete(cb.dataset.id);
      updateBatchUI();
    });
  });

  // 全选
  const selectAllCb = document.getElementById('selectAllCb');
  selectAllCb.checked = bills.length > 0 && bills.every(b => selectedIds.has(b.id));
  selectAllCb.indeterminate = bills.some(b => selectedIds.has(b.id)) && !selectAllCb.checked;

  selectAllCb.onclick = () => {
    if (selectAllCb.checked) {
      bills.forEach(b => selectedIds.add(b.id));
    } else {
      bills.forEach(b => selectedIds.delete(b.id));
    }
    // 仅更新复选框状态，避免完整重渲染导致事件监听器叠加
    tbody.querySelectorAll('.bill-cb').forEach(cb => {
      cb.checked = selectedIds.has(cb.dataset.id);
    });
    selectAllCb.checked = bills.length > 0 && bills.every(b => selectedIds.has(b.id));
    selectAllCb.indeterminate = bills.some(b => selectedIds.has(b.id)) && !selectAllCb.checked;
    updateBatchUI();
  };

  // 批量删除按钮
  updateBatchUI();

  document.querySelectorAll('thead th[data-sort]').forEach(th => {
    const key = th.dataset.sort;
    th.querySelector('.sort-arrow').textContent =
      (key === sortKey) ? (sortDir === 'asc' ? '▲' : '▼') : '';
  });
}

function updateBatchUI() {
  const btn = document.getElementById('batchDeleteBtn');
  const count = selectedIds.size;
  if (count > 0) {
    btn.classList.add('show');
    btn.textContent = '🗑️ 删除选中 (' + count + ')';
  } else {
    btn.classList.remove('show');
  }
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

async function refreshAll() { await syncData(); refreshUI(); }
function refreshUI() {
  renderYearTabs();
  renderSummary();
  renderTable();
  const today = new Date();
  const di = document.getElementById('billDate');
  di.value = currentYear === today.getFullYear() ? today.toISOString().slice(0, 10) : `${currentYear}-01-01`;
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show'), 1800);
}

// ============================================================
//  交易对象详情弹窗
// ============================================================
function showPartyModal(party) {
  const bills = cachedBills.filter(b => b.party === party);
  bills.sort((a, b) => a.date < b.date ? -1 : a.date > b.date ? 1 : 0);

  let totalInc = 0, totalExp = 0;
  for (const b of bills) {
    if (b.type === 'income') totalInc += Number(b.amount);
    else totalExp += Number(b.amount);
  }

  document.getElementById('modalTitle').textContent = '📋 ' + party;
  document.getElementById('modalSummary').innerHTML =
    `<div class="modal-summary-item"><div class="label">💰 总收入</div><div class="val inc">+¥${totalInc.toFixed(2)}</div></div>` +
    `<div class="modal-summary-item"><div class="label">💸 总支出</div><div class="val exp">-¥${totalExp.toFixed(2)}</div></div>` +
    `<div class="modal-summary-item"><div class="label">📊 净额</div><div class="val bal">¥${(totalInc - totalExp).toFixed(2)}</div></div>`;

  const tbody = document.getElementById('modalTableBody');
  if (bills.length === 0) {
    tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;color:#b2bec3;padding:32px;">没有记录</td></tr>';
  } else {
    tbody.innerHTML = bills.map(b => {
      const cls = b.type === 'income' ? 'income' : 'expense';
      const sign = b.type === 'income' ? '+' : '-';
      const descText = b.description || '<span style="color:#ccc">—</span>';
      return `<tr>
        <td>${b.date}</td>
        <td><span class="type-badge ${b.type}">${b.type === 'income' ? '收入' : '支出'}</span></td>
        <td class="amount-cell ${cls}">${sign}¥${Number(b.amount).toFixed(2)}</td>
        <td class="desc-cell" title="${esc(b.description || '')}">${descText}</td>
        <td><button class="delete-btn" data-id="${b.id}">🗑️</button></td>
      </tr>`;
    }).join('');
  }

  // 弹窗内的删除
  tbody.querySelectorAll('.delete-btn').forEach(btn => {
    btn.addEventListener('click', async () => {
      if (confirm('确定删除？')) {
        await deleteBillById(btn.dataset.id);
        await syncData();
        refreshUI();
        showPartyModal(party); // 刷新弹窗
        showToast('已删除');
      }
    });
  });

  document.getElementById('partyModal').classList.add('show');
}

function hidePartyModal() {
  document.getElementById('partyModal').classList.remove('show');
}

document.getElementById('modalClose').addEventListener('click', hidePartyModal);
document.getElementById('partyModal').addEventListener('click', function(e) {
  if (e.target === this) hidePartyModal(); // 点背景关闭
});

// ============================================================
//  提交账单
// ============================================================
document.getElementById('billForm').addEventListener('submit', async function(e) {
  e.preventDefault();
  if (!isGuest && (!accessToken || !currentUser)) return;

  const date = document.getElementById('billDate').value;
  const amountStr = document.getElementById('billAmount').value;
  const party = document.getElementById('billParty').value.trim();
  const descText = document.getElementById('billDesc').value.trim();

  if (!date || !amountStr || !party) { showToast('请填写日期、金额和交易对象'); return; }

  const amount = parseFloat(amountStr);
  if (isNaN(amount) || amount <= 0) { showToast('请输入有效金额'); return; }

  const by = parseInt(date.slice(0, 4));
  if (by !== currentYear && confirm(`切换到 ${by} 年？`)) currentYear = by;

  const isEdit = !!editingId;
  const billData = {
    date, type: currentType, party,
    amount: Math.round(amount * 100) / 100,
    description: descText || null
  };

  const btn = document.getElementById('submitBillBtn');
  btn.disabled = true; btn.textContent = '提交中...';
  try {
    if (isGuest) {
      const store = lsLoad();
      if (isEdit) {
        store.bills = store.bills.map(b => b.id === editingId ? { ...b, ...billData } : b);
      } else {
        store.bills.push({ id: genLocalId(), ...billData, user_id: 'guest' });
      }
      lsSave(store);
    } else {
      if (isEdit) {
        await api.updateBill(accessToken, editingId, billData);
      } else {
        await api.insertBill(accessToken, { ...billData, user_id: currentUser.id });
      }
    }
    await syncData();
    refreshUI();
    showToast(`${isEdit ? '已更新' : '已记录'}：¥${amount.toFixed(2)}`);
    resetEditMode();
    document.getElementById('billAmount').focus();
  } catch (err) {
    showToast('保存失败：' + err.message);
  } finally {
    btn.disabled = false;
    btn.textContent = isEdit ? '✏️ 更 新' : '📝 记 录';
  }
});

// ============================================================
//  事件绑定
// ============================================================
document.getElementById('typeToggle').addEventListener('click', function(e) {
  const btn = e.target.closest('.type-btn');
  if (!btn) return;
  document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentType = btn.dataset.type;
});

document.getElementById('filterParty').addEventListener('input', renderTable);
document.getElementById('filterType').addEventListener('change', renderTable);

// 清空今年全部账单
document.getElementById('clearAllBtn').addEventListener('click', async () => {
  const bills = getBillsForYear(currentYear);
  if (bills.length === 0) { showToast('当前年份没有账单'); return; }
  if (!confirm(`确定要删除 ${currentYear} 年的全部 ${bills.length} 条账单吗？此操作不可恢复！`)) return;
  if (!confirm('再次确认：真的要全部删除吗？')) return;
  let deleted = 0;
  for (const b of bills) {
    try { await deleteBillById(b.id); deleted++; }
    catch (e) { console.error('删除失败:', b.id, e); }
  }
  selectedIds.clear();
  await syncData();
  refreshUI();
  showToast(`已清空 ${currentYear} 年，共删除 ${deleted} 条记录`);
});

// 批量删除选中
document.getElementById('batchDeleteBtn').addEventListener('click', async () => {
  const count = selectedIds.size;
  if (count === 0) return;
  if (!confirm(`确定要删除选中的 ${count} 条账单吗？此操作不可恢复！`)) return;
  let deleted = 0;
  for (const id of selectedIds) {
    try { await deleteBillById(id); deleted++; }
    catch (e) { console.error('删除失败:', id, e); }
  }
  selectedIds.clear();
  await syncData();
  refreshUI();
  showToast(`已删除 ${deleted} 条记录`);
});

function resetEditMode() {
  editingId = null;
  document.getElementById('billAmount').value = '';
  document.getElementById('billParty').value = '';
  document.getElementById('billDesc').value = '';
  document.getElementById('submitBillBtn').textContent = '📝 记 录';
  document.getElementById('cancelEditBtn').style.display = 'none';
  document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
  document.querySelector('.type-btn.income-btn').classList.add('active');
  currentType = 'income';
}

// 取消编辑
document.getElementById('cancelEditBtn').addEventListener('click', resetEditMode);

document.querySelectorAll('thead th[data-sort]').forEach(th => {
  th.addEventListener('click', () => {
    const key = th.dataset.sort;
    if (sortKey === key) sortDir = sortDir === 'asc' ? 'desc' : 'asc';
    else { sortKey = key; sortDir = 'desc'; }
    renderTable();
  });
});

refreshUI();
</script>
